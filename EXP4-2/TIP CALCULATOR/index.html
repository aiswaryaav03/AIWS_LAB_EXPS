<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💡 Tip Calculator</h1>

    <!-- Using onsubmit to prevent reload -->
    <form id="tipForm">

        <label>Bill Amount (Rs.):</label>
        <input type="number" id="bill" placeholder="Enter bill amount" min="0">

        <label>Tip Percentage (%):</label>
        <input type="number" id="tip" placeholder="Enter tip %" min="0">

        <label>Number of People:</label>
        <input type="number" id="people" value="1" min="1">

        <button type="submit">Calculate</button>

    </form>

    <div class="result">
        <h2>Total Tip: Rs. <span id="tipAmount">0</span></h2>
        <h2>Total Amount: Rs. <span id="totalAmount">0</span></h2>
        <h2>Per Person: Rs. <span id="perPerson">0</span></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
